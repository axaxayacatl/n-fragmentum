<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>— Fragmentum</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#111;
}

.section{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.black{
    background:#020202;
}

.grey{
    background:#ececec;
}

/* Lamp Glow */

.lamp{
    position:absolute;
    width:360px;
    height:360px;
    border-radius:50%;
    background:radial-gradient(circle,
        rgba(255,255,255,.55) 0%,
        rgba(255,255,255,.22) 28%,
        rgba(255,255,255,.08) 55%,
        transparent 80%);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    filter:blur(45px);
}

.grey .lamp{
    background:radial-gradient(circle,
        rgba(255,255,255,.95),
        rgba(255,255,255,.55),
        rgba(255,255,255,.15),
        transparent);
}

/* Ghost */

.ghost{
    position:relative;
    width:260px;
    height:360px;
    filter:blur(16px);
}

.petal{
    position:absolute;
    border-radius:50%;
    mix-blend-mode:screen;
}

.red .petal{
    background:radial-gradient(circle at 35% 35%,
        #ffcccc,
        #ff5d73 30%,
        #ff1640 60%,
        transparent 85%);
}

.blue .petal{
    background:radial-gradient(circle at 35% 35%,
        #ffffff,
        #d8f4ff 30%,
        #9fdcff 60%,
        transparent 85%);
}

.white .petal{
    background:radial-gradient(circle at 35% 35%,
        #ffffff,
        #ffffff 40%,
        rgba(255,255,255,.55) 70%,
        transparent);
}

/* Petal Layout */

.p1{
    width:120px;
    height:170px;
    left:70px;
    top:0;
}

.p2{
    width:130px;
    height:180px;
    left:20px;
    top:70px;
}

.p3{
    width:130px;
    height:180px;
    right:20px;
    top:70px;
}

.p4{
    width:160px;
    height:200px;
    left:50px;
    top:120px;
}

.center{
    position:absolute;
    width:90px;
    height:90px;
    left:85px;
    top:110px;
    border-radius:50%;
}

.red .center{
    background:radial-gradient(circle,
        #ffd5d5,
        #ff6078,
        transparent 80%);
}

.blue .center{
    background:radial-gradient(circle,
        #ffffff,
        #bde9ff,
        transparent 80%);
}

.white .center{
    background:radial-gradient(circle,
        #ffffff,
        rgba(255,255,255,.7),
        transparent 80%);
}

.stem{
    position:absolute;
    width:42px;
    height:180px;
    left:109px;
    bottom:-10px;
    border-radius:100px;
}

.red .stem{
    background:linear-gradient(
        rgba(255,95,120,.95),
        rgba(255,20,70,.25),
        transparent);
}

.blue .stem{
    background:linear-gradient(
        rgba(180,230,255,.95),
        rgba(110,190,255,.25),
        transparent);
}

.white .stem{
    background:linear-gradient(
        rgba(255,255,255,.95),
        rgba(255,255,255,.25),
        transparent);
}

.caption{
    position:absolute;
    bottom:40px;
    color:#aaa;
    letter-spacing:3px;
    font-size:14px;
    text-transform:uppercase;
}

.grey .caption{
    color:#777;
}
</style>
</head>
<body>

<!-- RED -->

<section class="section black">
    <div class="lamp"></div>

    <div class="ghost red">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="center"></div>
        <div class="stem"></div>
    </div>

    <div class="caption">coming soon</div>
</section>

</body>
</html>
